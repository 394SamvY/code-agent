hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - data.train_files=/root/autodl-tmp/code-agent/data/verl/sft/sft_accepted_train.parquet
    - data.val_files=/root/autodl-tmp/code-agent/data/verl/sft/sft_accepted_val.parquet
    - data.messages_key=messages
    - data.tools_key=tools
    - data.enable_thinking_key=enable_thinking
    - data.enable_thinking_default=true
    - data.custom_cls.path=/root/autodl-tmp/code-agent/src/verl_sft_dataset_fix.py
    - data.custom_cls.name=FixedMultiTurnSFTDataset
    - data.pad_mode=no_padding
    - data.max_length=32768
    - data.truncation=right
    - data.train_batch_size=16
    - data.micro_batch_size_per_gpu=1
    - data.max_token_len_per_gpu=16384
    - data.num_workers=4
    - data.ignore_input_ids_mismatch=true
    - model.path=/root/autodl-tmp/models/Qwen3-8B
    - model.trust_remote_code=false
    - model.use_remove_padding=true
    - model.enable_gradient_checkpointing=true
    - model.lora_rank=0
    - model.lora_adapter_path=null
    - optim.lr=1e-5
    - optim.weight_decay=0.01
    - optim.lr_warmup_steps_ratio=0.03
    - checkpoint.save_contents=[hf_model]
    - trainer.default_local_dir=/root/autodl-tmp/code-agent/outputs/verl_sft/qwen3_8b_oj_sft_20260505_032710
    - trainer.project_name=code-agent-sft
    - trainer.experiment_name=qwen3_8b_oj_sft_20260505_032710
    - trainer.logger=console
    - trainer.total_epochs=3
    - trainer.resume_mode=disable
    - trainer.save_freq=after_each_epoch
    - trainer.test_freq=10
    - trainer.max_ckpt_to_keep=1
    - engine.model_dtype=bf16
    - engine.dtype=bfloat16
    - engine.optimizer_offload=true
    - engine.param_offload=true
    - engine.ulysses_sequence_parallel_size=2
  job:
    name: sft_trainer
    chdir: null
    override_dirname: checkpoint.save_contents=[hf_model],data.custom_cls.name=FixedMultiTurnSFTDataset,data.custom_cls.path=/root/autodl-tmp/code-agent/src/verl_sft_dataset_fix.py,data.enable_thinking_default=true,data.enable_thinking_key=enable_thinking,data.ignore_input_ids_mismatch=true,data.max_length=32768,data.max_token_len_per_gpu=16384,data.messages_key=messages,data.micro_batch_size_per_gpu=1,data.num_workers=4,data.pad_mode=no_padding,data.tools_key=tools,data.train_batch_size=16,data.train_files=/root/autodl-tmp/code-agent/data/verl/sft/sft_accepted_train.parquet,data.truncation=right,data.val_files=/root/autodl-tmp/code-agent/data/verl/sft/sft_accepted_val.parquet,engine.dtype=bfloat16,engine.model_dtype=bf16,engine.optimizer_offload=true,engine.param_offload=true,engine.ulysses_sequence_parallel_size=2,model.enable_gradient_checkpointing=true,model.lora_adapter_path=null,model.lora_rank=0,model.path=/root/autodl-tmp/models/Qwen3-8B,model.trust_remote_code=false,model.use_remove_padding=true,optim.lr=1e-5,optim.lr_warmup_steps_ratio=0.03,optim.weight_decay=0.01,trainer.default_local_dir=/root/autodl-tmp/code-agent/outputs/verl_sft/qwen3_8b_oj_sft_20260505_032710,trainer.experiment_name=qwen3_8b_oj_sft_20260505_032710,trainer.logger=console,trainer.max_ckpt_to_keep=1,trainer.project_name=code-agent-sft,trainer.resume_mode=disable,trainer.save_freq=after_each_epoch,trainer.test_freq=10,trainer.total_epochs=3
    id: ???
    num: ???
    config_name: sft_trainer_engine
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /root/autodl-tmp/code-agent
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /root/miniconda3/lib/python3.12/site-packages/verl/trainer/config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /root/autodl-tmp/code-agent/outputs/2026-05-05/03-27-17
    choices:
      profiler: profiler
      optim: fsdp
      engine: fsdp
      model: hf_model
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
