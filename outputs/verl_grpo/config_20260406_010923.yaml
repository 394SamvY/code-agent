# Agentic GRPO Full Fine-Tuning — Qwen3-8B on 2×A800-80G
#
# 继承 verl 的完整 ppo_trainer 默认配置，只覆盖需要修改的字段。
# configs/verl/ 下的 symlinks 指向 verl 内置配置。

defaults:
  - ppo_trainer
  - _self_

# ═══════════════════════════════════════════════════
#  以下仅覆盖需要修改的字段，其余全部继承 ppo_trainer 默认值
# ═══════════════════════════════════════════════════

data:
  train_files: ./data/verl/train.parquet
  val_files: ./data/verl/val.parquet
  train_batch_size: 128
  return_raw_chat: true
  apply_chat_template_kwargs:
    enable_thinking: false

actor_rollout_ref:
  model:
    path: /root/autodl-tmp/models/Qwen3-8B
    enable_gradient_checkpointing: true

  actor:
    ppo_mini_batch_size: 32
    ppo_micro_batch_size_per_gpu: 2
    ppo_epochs: 1
    use_kl_loss: false
    entropy_coeff: 0.001
    clip_ratio: 0.2
    grad_clip: 1.0
    use_torch_compile: false
    fsdp_config:
      param_offload: true
      optimizer_offload: true
    optim:
      lr: 5.0e-7
      weight_decay: 0.01

  ref:
    log_prob_micro_batch_size_per_gpu: 2
    use_torch_compile: false

  rollout:
    name: sglang
    gpu_memory_utilization: 0.5
    tensor_model_parallel_size: 1
    temperature: 0.9
    top_p: 0.95
    response_length: 1024
    log_prob_micro_batch_size_per_gpu: 2
    n: 4
    agent:
      num_workers: 4
    multi_turn:
      enable: true
      tool_config_path: configs/verl/tool_config.yaml
      tokenization_sanity_check_mode: ignore_strippable

reward:
  num_workers: 2
  custom_reward_function:
    path: src/reward.py
    name: compute_score

algorithm:
  adv_estimator: grpo

trainer:
  nnodes: 1
  n_gpus_per_node: 2
  total_epochs: 7
  save_freq: 7
  test_freq: 7
  max_actor_ckpt_to_keep: 1
  project_name: code-agent-grpo
  experiment_name: qwen3-8b-full-grpo
  logger:
    - tensorboard
  default_local_dir: ./outputs/verl_grpo/checkpoints
  rollout_data_dir: ./outputs/verl_grpo/rollout_data
  log_val_generations: 20
