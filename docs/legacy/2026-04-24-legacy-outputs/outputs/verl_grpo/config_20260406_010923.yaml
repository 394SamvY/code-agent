# Agentic GRPO Full Fine-Tuning — Qwen3-8B on 2×A800-80G
#
# 继承 verl 的完整 ppo_trainer 默认配置，只覆盖需要修改的字段。
# configs/verl/ 下的 symlinks 指向 verl 内置配置。

defaults:
  - ppo_trainer
  - _self_

# ═══════════════════════════════════════════════════
#  以下仅覆盖需要修改的字段，其余全部继承 ppo_trainer 默认值
# ═══════════════════════════════════════════════════

data:
  train_files: ./data/verl/train.parquet
  val_files: ./data/verl/val.parquet
  train_batch_size: 128       # 每个 step 采样 128 道题
  return_raw_chat: true
  apply_chat_template_kwargs:
    enable_thinking: false    # 训练时禁用 Qwen3 思考模式

actor_rollout_ref:
  model:
    path: /root/autodl-tmp/models/Qwen3-8B
    enable_gradient_checkpointing: true   # 用显存换计算，省显存

  actor:
    # ── batch 拆分层级 ──
    # 128 题 × rollout_n 4 = 512 条轨迹（一个 step 的总数据量）
    #   → 512 ÷ ppo_mini_batch_size 32 = 16 个 mini-batch（梯度累积）
    #     → 32 ÷ ppo_micro_batch_size_per_gpu 2 ÷ 2 GPU = 8 个 micro-batch（省显存）
    # 16 个 mini-batch 全部跑完后，一次 optimizer.step() 更新参数
    ppo_mini_batch_size: 32
    ppo_micro_batch_size_per_gpu: 2
    ppo_epochs: 1             # 每个 step 的 512 条轨迹只过一遍（不重复训练）
    use_kl_loss: false        # 不用 KL 散度约束（GRPO 不需要）
    entropy_coeff: 0.001      # 熵正则系数，鼓励探索
    clip_ratio: 0.2           # PPO clip 范围 [1-0.2, 1+0.2]
    grad_clip: 1.0            # 梯度裁剪，防止梯度爆炸
    use_torch_compile: false
    fsdp_config:
      param_offload: true     # 训练时模型参数卸载到 CPU，省显存
      optimizer_offload: true # 优化器状态也卸载到 CPU
    optim:
      lr: 5.0e-7              # 学习率，RL 微调通常很小
      weight_decay: 0.01

  ref:
    log_prob_micro_batch_size_per_gpu: 2
    use_torch_compile: false

  rollout:
    name: sglang
    gpu_memory_utilization: 0.5   # SGLang 推理引擎最多用 50% 显存（另 50% 留给训练）
    tensor_model_parallel_size: 1 # 每个 SGLang 实例的 TP（这里每个实例单卡）
    temperature: 0.9              # 采样温度，越高越随机
    top_p: 0.95
    response_length: 1024         # 最大生成长度
    log_prob_micro_batch_size_per_gpu: 2
    n: 4                          # rollout_n：每道题采样 4 条不同回复
    agent:
      num_workers: 4              # 4 个 AgentLoopWorker 并发执行 tool call
    multi_turn:
      enable: true                # 启用多轮对话（模型生成 → tool call → 继续生成）
      tool_config_path: configs/verl/tool_config.yaml
      tokenization_sanity_check_mode: ignore_strippable

reward:
  num_workers: 2
  custom_reward_function:
    path: src/reward.py           # rule-based reward：执行代码 + 跑测试 + 算通过率
    name: compute_score

algorithm:
  adv_estimator: grpo             # 用 GRPO 算 advantage（不需要 critic）

trainer:
  nnodes: 1                       # 单节点
  n_gpus_per_node: 2              # 2 块 A800
  total_epochs: 7                 # 7 个 epoch，每 epoch 2 batch → 14 steps
  save_freq: 7                    # 每 7 步保存 checkpoint（= 最后一步保存）
  test_freq: 7                    # 每 7 步做验证（= 最后一步验证）
  max_actor_ckpt_to_keep: 1       # 只保留最新 1 个 checkpoint
  project_name: code-agent-grpo
  experiment_name: qwen3-8b-full-grpo
  logger:
    - tensorboard
  default_local_dir: ./outputs/verl_grpo/checkpoints
  rollout_data_dir: ./outputs/verl_grpo/rollout_data
  log_val_generations: 20         # 验证时记录 20 条生成样例
