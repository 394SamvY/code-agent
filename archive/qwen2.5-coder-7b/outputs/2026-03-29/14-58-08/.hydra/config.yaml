data:
  train_files: data/sft/train.parquet
  val_files: data/sft/val.parquet
  messages_key: messages
  tools_key: tools
  use_dynamic_bsz: true
  max_token_len_per_gpu: 8192
  pad_mode: no_padding
  max_length: 4096
  truncation: right
  train_batch_size: 16
  micro_batch_size_per_gpu: 2
  num_workers: 4
model:
  path: /root/autodl-tmp/models/Qwen2.5-Coder-7B-Instruct
  lora_rank: 16
  lora_alpha: 32
  target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
optim:
  lr: 2.0e-05
  lr_scheduler_type: cosine
  lr_warmup_steps_ratio: 0.05
  weight_decay: 0.01
  clip_grad: 1.0
trainer:
  total_epochs: 3
  save_freq: after_each_epoch
  test_freq: after_each_epoch
  default_local_dir: outputs/sft_ckpt
  project_name: code-agent-sft
  experiment_name: qwen7b-multiturn-sft
  logger:
  - console
