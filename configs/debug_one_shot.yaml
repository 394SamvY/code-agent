# Debug: CPU smoke test, 极小规模
model:
  name: "Qwen/Qwen2.5-Coder-0.5B-Instruct"
  use_lora: true
  lora_r: 8
  lora_alpha: 16
  lora_target_modules: ["q_proj", "v_proj"]

data:
  dataset: "mbpp_full"
  split_train: "train"
  split_val: "validation"
  max_prompt_length: 512
  max_completion_length: 128
  max_train_samples: 4

grpo:
  num_generations: 2
  temperature: 0.7
  beta: 0.04
  learning_rate: 1.0e-5
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 1
  num_train_epochs: 1
  save_steps: 999
  logging_steps: 1

reward:
  execution_timeout: 5
  pass_reward: 1.0
  fail_reward: 0.0

output_dir: "./outputs/debug_one_shot"
report_to: "none"
