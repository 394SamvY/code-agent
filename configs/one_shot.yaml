# Phase 1: One-shot GRPO Training
model:
  name: "Qwen/Qwen2.5-Coder-1.5B-Instruct"
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]

data:
  dataset: "mbpp_full"
  split_train: "train"
  split_val: "validation"
  max_prompt_length: 1024
  max_completion_length: 512
  # 追加 APPS 数据集
  use_apps: false
  apps:
    difficulty: "introductory"
    max_samples: 3000

grpo:
  num_generations: 8
  temperature: 0.7
  beta: 0.04
  learning_rate: 1.0e-5
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 2
  num_train_epochs: 3
  save_steps: 50
  logging_steps: 5

reward:
  execution_timeout: 5
  pass_reward: 1.0
  fail_reward: 0.0

output_dir: "./outputs/one_shot"
