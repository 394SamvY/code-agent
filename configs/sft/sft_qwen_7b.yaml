# SFT 配置 — Qwen2.5-Coder-7B-Instruct 多轮工具调用微调
#
# 基于 verl 的 MultiTurnSFTDataset，训练模型学会：
# 1. 正确输出 <tool_call> 格式
# 2. 根据工具反馈修复代码
# 3. 在测试通过后给出总结
#
# 启动方式（torchrun 单机）：
#   torchrun --standalone --nproc_per_node=4 \
#     -m verl.trainer.sft_trainer \
#     --config-path=configs/sft --config-name=sft_qwen_7b
#
# 启动方式（Ray 单机/多机）：
#   python -m verl.trainer.main_sft \
#     --config-path=configs/sft --config-name=sft_qwen_7b \
#     trainer.n_gpus_per_node=4

data:
  train_files: data/sft/train.parquet       # 训练数据路径
  val_files: data/sft/val.parquet           # 验证数据路径

  messages_key: messages                     # parquet 中多轮对话列的列名
                                             # 每行是一条完整轨迹: [{role:system,...}, {role:user,...}, ...]
  tools_key: tools                           # parquet 中工具 schema 列的列名
                                             # 每行是该条轨迹可用的工具描述（传给 apply_chat_template 注入到 prompt 中）
                                             # 注意：这不是 messages 里的 tool_calls（那是实际调用记录）
                                             # 而是告诉模型"有哪些工具可用"的 schema 描述
                                             # 我们只有 execute_code 一个工具，所以每行内容相同

  # --- 动态批处理 ---
  # use_dynamic_bsz 和 micro_batch_size_per_gpu 是互斥的两种模式（verl源码为 if-else 分支）：
  #   true  → 按 max_token_len_per_gpu 组 micro batch（按 token 总数）
  #   false → 按 micro_batch_size_per_gpu 组 micro batch（按固定样本数）
  use_dynamic_bsz: true                      # 开启动态批处理，按 token 总数组 batch
                                             # 长序列少放几条，短序列多放几条，GPU 利用率更高
  max_token_len_per_gpu: 8192                # 每 GPU 每个 micro batch 最多装多少 token
                                             # 仅 use_dynamic_bsz=true 时生效
  pad_mode: no_padding                       # 不做 padding，用 NestedTensor 打包变长序列
                                             # 零浪费，配合动态批处理使用

  # --- 序列长度 ---
  max_length: 4096                           # 单条轨迹 tokenize 后的最大长度，超过被截断
  truncation: right                          # 截断方向：从右边截（丢弃尾部）

  # --- 批次大小 ---
  train_batch_size: 16                       # 全局 batch size（所有 GPU 合计）
                                             # 2 卡时每卡 8 条，4 卡时每卡 4 条
  micro_batch_size_per_gpu: 2                # 每 GPU 每次前向的样本数
                                             # 仅 use_dynamic_bsz=false 时生效
                                             # 当前开了动态批处理，此参数不参与 micro batch 拆分

  num_workers: 4                             # DataLoader 数据加载进程数

model:
  path: /root/autodl-tmp/models/Qwen2.5-Coder-7B-Instruct      # 基座模型（本地路径）

  # --- LoRA ---
  lora_rank: 16                              # 低秩矩阵的秩 r，越大表达力越强
  lora_alpha: 32                             # 缩放系数 α，实际缩放 = α/r = 2
  target_modules:                            # 对哪些层加 LoRA
    - q_proj                                 #   attention query 投影
    - k_proj                                 #   attention key 投影
    - v_proj                                 #   attention value 投影
    - o_proj                                 #   attention output 投影

optim:
  lr: 2e-5                                   # 学习率
  lr_scheduler_type: cosine                  # 余弦衰减：从 lr 逐渐降到接近 0
  lr_warmup_steps_ratio: 0.05               # 前 5% 步数线性升温，避免初始震荡
  weight_decay: 0.01                         # 权重衰减，轻微 L2 正则化
  clip_grad: 1.0                             # 梯度裁剪阈值，防止梯度爆炸

trainer:
  total_epochs: 3                            # 训练轮数：数据集遍历 3 次
  save_freq: after_each_epoch                # 每 epoch 保存 checkpoint
  test_freq: after_each_epoch                # 每 epoch 在验证集上算 loss
  default_local_dir: outputs/sft_ckpt        # checkpoint 保存目录
  project_name: code-agent-sft               # 日志项目名
  experiment_name: qwen7b-multiturn-sft      # 日志实验名
  logger:
    - console                                # 日志输出到终端（可加 wandb）
