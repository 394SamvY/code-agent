# Debug: CPU smoke test for multi-turn
model:
  name: "Qwen/Qwen2.5-Coder-1.5B-Instruct"
  use_lora: true
  lora_r: 8
  lora_alpha: 16
  lora_target_modules: ["q_proj", "v_proj"]
  resume_from: null

data:
  dataset: "mbpp_full"
  split_train: "train"
  split_val: "validation"
  max_response_length: 512
  max_train_samples: 2

grpo:
  num_generations: 2
  temperature: 0.7
  beta: 0.04
  learning_rate: 5.0e-6
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 1
  num_train_epochs: 1
  save_steps: 999
  logging_steps: 1

agent:
  max_turns: 2
  tools:
    - write_code
    - run_tests
    - debug
    - submit

reward:
  execution_timeout: 5

output_dir: "./outputs/debug_multi_turn"
report_to: "none"
use_cpu: true
