tools:
- class_name: src.verl_tools.execute_code_tool.ExecuteCodeTool
  config:
    type: native
  tool_schema:
    type: function
    function:
      name: execute_code
      description: Execute Python code and run all test cases. Returns pass/fail
        count with detailed error messages and traceback for failures.
      parameters:
        type: object
        properties:
          code:
            type: string
            description: The complete Python function code.
        required:
        - code
