# Agentic GRPO Training — Qwen2.5-Coder-7B-Instruct
#
# 目标: 训练模型学会 execute_code → 看反馈 → 修复 → 再 execute_code 的迭代调试能力
# 框架: verl + SGLang multi-turn rollout + FSDP
# 硬件建议: 4×A100-40G（LoRA）或 4×A100-80G（全量）

data:
  train_files: ./data/verl/train.parquet
  val_files: ./data/verl/val.parquet
  train_batch_size: 128         # 一次 rollout 的总轨迹数（verl 自动算 prompt 数 = 128/n = 16）
  return_raw_chat: true         # 返回原始 messages 格式（多轮 Agent 必须开启）
  chat_template_kwargs:
    add_generation_prompt: true

actor_rollout_ref:
  model:
    path: Qwen/Qwen2.5-Coder-7B-Instruct

  actor:
    # --- 训练批次 ---
    ppo_mini_batch_size: 32               # 每次参数更新用多少条轨迹（128/32=4 次更新 per epoch）
    ppo_micro_batch_size_per_gpu: 2       # 每张 GPU 每次前向的轨迹数（显存限制，累积梯度）
    ppo_epochs: 1                         # 每批轨迹用几次（1=每条轨迹只用 1 次，on-policy）

    # --- RL 核心 ---
    use_kl_loss: true                     # 开启 KL 散度约束（GRPO 必须开启）
    kl_loss_coef: 0.01                    # β：KL 惩罚系数，越大越保守，防止模型跑偏
    kl_loss_type: low_var_kl              # 低方差 KL 估计，比朴素 KL 更稳定
    entropy_coeff: 0.001                  # α：Entropy 奖励系数，防止策略坍缩到单一模式
    clip_ratio: 0.2                       # ε：PPO clip 范围，每次更新概率最多变化 20%
    grad_clip: 1.0                        # 梯度裁剪阈值，防止梯度爆炸

    # --- 优化器 ---
    optim:
      lr: 5.0e-6                          # 学习率
      weight_decay: 0.01                  # 权重衰减，轻微正则化
      warmup_ratio: 0.05                  # 前 5% 步数线性升温学习率

    # --- LoRA ---
    peft:
      peft_type: lora
      lora_rank: 16                       # 低秩矩阵的秩，越大表达力越强但参数越多
      lora_alpha: 32                      # 缩放系数，通常设为 rank 的 2 倍
      target_modules:                     # 对 attention 的哪些投影层加 LoRA
        - q_proj
        - k_proj
        - v_proj
        - o_proj

    gradient_checkpointing: true          # 用计算换显存，减少激活值的显存占用
    fsdp:
      enable: true                        # 开启 FSDP 分片并行

  ref:
    fsdp:
      enable: true                        # Reference 模型也用 FSDP 分片

  rollout:
    name: sglang                          # 推理引擎（多轮场景 SGLang 有前缀共享优势）
    gpu_memory_utilization: 0.5           # SGLang 占 50% 显存，剩下留给 Actor 训练
    tensor_model_parallel_size: 1         # 7B 模型不需要张量并行

    # --- 多轮 Agent 配置 ---
    multi_turn:
      enable: true
      tokenization_sanity_check_mode: ignore_strippable  # tokenization 一致性检查，忽略空白差异
      max_turns: 10                       # 最多 10 轮工具调用交互

    # --- 工具配置 ---
    tool_kwargs:
      tools_config_file: configs/verl/tool_config.yaml

    # --- 生成参数 ---
    temperature: 0.9                      # 采样温度，越高越随机（探索多种写法）
    top_p: 0.95                           # 核采样，只从概率前 95% 的 token 里选
    max_new_tokens: 512                   # 每轮最多生成 512 个 token

    # --- GRPO 采样 ---
    n: 8                                  # 每个 prompt 采样 G=8 条轨迹，同组比较算 advantage

algorithm:
  adv_estimator: grpo                     # 用 GRPO 算 advantage（不需要 Critic 模型）

trainer:
  total_epochs: 10                        # 训练总轮数
  save_freq: 50                           # 每 50 步保存 checkpoint
  test_freq: 100                          # 每 100 步在验证集上评估
  project_name: code-agent-grpo
  experiment_name: qwen7b-agentic-grpo
  logger:
    - wandb                               # 训练日志可视化
  rollout_data_dir: ./outputs/verl_grpo/rollout_data
